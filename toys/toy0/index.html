<!doctype html>
<html lang="en">

<head>
    <title>Toys0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../styles.css">
    <style type="text/css">
        audio {
            display: none;
        }
        .layer1-toggle {
            background-color: #f1f3f8;
            bottom: 50%;
            right: 50%;
        }
        .layer2-toggle {
            background-color: #d6e0f0;
            bottom: 50%;
            left: 50%;
        }
        .layer3-toggle {
            background-color: #8d93ab;
            top: 50%;
            right: 50%;
        }
        .layer4-toggle {
            background-color: #393b44;
            top: 50%;
            left: 50%;
        }
        .layer-toggle {
            height: 50%;
            width: 50%;
            position: absolute;
            display: block;
            border: 0;
            transition: all 0.125s ease-in-out;
        }

        .layer-toggle.silenced {
            height: 25%;
            width: 25%;
        }

    </style>
</head>

<body class="toy-background">
    <div class="navbar">
        <a href="../../index.html">Home</a>
        <a href="animation.html">Animations</a>
        <a href="about.html">About Me</a>
        <span class="dropdown">
                <a href="links.html" class="dropbtn">Other Projects</a>
                <span class="dropdown-content">
                    <a href="../index.html">Toy Box</a>
                    <a href="https://tazhinkle.github.io/dnd-monster-charts/" target="_blank">D&D Monster Charts</a>
                    <a href="https://dc801.store/products/dc801-safemode-badge" target="_blank">DC801 Defcon badge</a>
                    <a href="https://github.com/TazHinkle/" target="_blank">GitHub Profile</a>
                    <a href="video.html">Java Projects</a>
                    <a href="https://tazhinkle.github.io/tictactoe/" target="_blank">TicTacToe</a>
                </span>
            </span>
    </div>
    <header>
        <h1>Elements</h1>
    </header>

    <div class="control-div">
        <button id="start-button">Start</button>
        <button id="stop-button">Stop</button>
    </div>
    <div class="toy-holder">
        <div class="layer-div">
            <button class="layer-toggle layer1-toggle" data-layer="0">Layer 1</button>
            <button class="layer-toggle layer2-toggle" data-layer="1">Layer 2</button>
            <button class="layer-toggle layer3-toggle" data-layer="2">Layer 3</button>
            <button class="layer-toggle layer4-toggle" data-layer="3">Layer 4</button>
        </div>
    </div>
    <audio id="layer1" controls>
        <source src="layer1.mp3" type="audio/mpeg"/>
    </audio>
    <audio id="layer2" controls>
        <source src="layer2.mp3" type="audio/mpeg"/>
    </audio>
    <audio id="layer3" controls>
        <source src="layer3.mp3" type="audio/mpeg"/>
    </audio>
    <audio id="layer4" controls>
        <source src="layer4.mp3" type="audio/mpeg"/>
    </audio>

    <script src="./toy0.js"></script>
</body>

</html>
